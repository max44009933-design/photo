name: MyTrackerApp
options:
  bundleIdPrefix: com.yourname
targets:
  MyTrackerApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0" # 👈 這裡改成 16.0 啦！
    sources: [Sources]
    info:
      path: Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: "NO"
      CODE_SIGNING_ALLOWED: "NO"
